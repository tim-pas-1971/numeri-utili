<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numeri Utili - Tiziana Pascali</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icona-app.png?v=2" type="image/png">
    <link rel="apple-touch-icon" href="icona-app.png?v=2">    
</head>
<body>
    <div id="app-container">
        <header>
            <div class="header-left">
                <h1 onclick="goHome()" style="cursor:pointer; color:var(--primary); margin:0;">🗂️ Numeri Utili</h1>
                <div class="subtitle-tiziana">Numeri Utili di Tiziana Pascali</div>
                <div class="start-address-label">📍 Via Cascina Comune, 24 – Pregnana Milanese (MI)</div>
            </div>
            <div class="header-right">
                <button class="btn-top" onclick="openManage()">GESTISCI</button>
                <button class="btn-top" onclick="openSearchPanel()">RICERCA</button>
                <button class="btn-top" onclick="openAddForm()" style="background:var(--secondary)">AGGIUNGI</button>
                <button class="btn-top" onclick="toggleGoogleSearch()" style="background:#4285F4">GOOGLE</button>
            </div>
        </header>

        <main id="main-content">
            </main>

        <footer>
            <button class="btn-footer" onclick="window.print()">STAMPA PAGINA</button>
            <button class="btn-footer-reset" onclick="resetApp()">RESET COMPLETO</button>
        </footer>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <span>Ricerca Google</span>
            <button onclick="toggleGoogleSearch()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.5rem;">&times;</button>
        </div>
        <iframe id="google-iframe" src="https://www.google.com/search?igu=1"></iframe>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
        <div class="form-card" onclick="event.stopPropagation()">
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

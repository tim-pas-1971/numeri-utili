<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numeri Utili - Tiziana Pascali</title>
    <style>
        :root { --primary: #003366; --secondary: #28a745; --bg: #f4f7f6; --text: #333; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        header { background: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid-main { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card-cat { background: white; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.3s; border-left: 5px solid var(--primary); }
        .card-cat:hover { transform: translateY(-5px); }
        .card-cat i { font-size: 2em; display: block; margin-bottom: 10px; }
        .btn-top { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin-left: 5px; font-weight: bold; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .form-card { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; position: relative; }
        .hidden { display: none !important; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        #sidebar { position: fixed; right: -400px; top: 0; width: 400px; height: 100%; background: white; box-shadow: -2px 0 5px rgba(0,0,0,0.2); transition: 0.3s; z-index: 1100; }
        #sidebar.open { right: 0; }
        iframe { width: 100%; height: calc(100% - 50px); border: none; }
    </style>
</head>
<body>
    <div id="app-container">
        <header>
            <div class="header-left">
                <h1 onclick="goHome()" style="cursor:pointer; color:var(--primary); margin:0;">📂 Numeri Utili</h1>
                <div style="color:red; font-weight:bold;">Rubrica Personale di Tiziana Pascali</div>
                <small>📍 Via Cascina Comune, 24 – Pregnana Milanese (MI)</small>
            </div>
            <div class="header-right">
                <button class="btn-top" onclick="openManage()">GESTISCI</button>
                <button class="btn-top" onclick="openSearchPanel()">RICERCA</button>
                <button class="btn-top" onclick="openAddForm()" style="background:var(--secondary)">AGGIUNGI</button>
                <button class="btn-top" onclick="toggleGoogleSearch()" style="background:#4285F4">GOOGLE</button>
            </div>
        </header>

        <div id="view-main" class="grid-main"></div>
        
        <div id="view-detail" class="hidden">
            <button class="btn-top" onclick="goHome()">⬅️ Torna</button>
            <h2 id="title-detail"></h2>
            <div id="sub-buttons-container" style="margin: 20px 0;"></div>
            <div id="records-list"></div>
        </div>
    </div>

    <div id="form-overlay" class="modal-overlay hidden">
        <div class="form-card">
            <h2>Scheda Nominativo</h2>
            <div class="form-row">
                <div class="form-group"><label>Categoria</label><select id="f-cat" onchange="updateSub()"></select></div>
                <div class="form-group"><label>Sottocategoria</label><select id="f-sub" onchange="updateSubSub()"></select></div>
            </div>
            <div id="ss-group" class="form-group hidden"><label>Livello 3</label><select id="f-ss"></select></div>
            <div class="form-group"><label>Nome</label><input type="text" id="f-nome"></div>
            <div class="form-row">
                <div class="form-group"><label>Tel</label><input type="text" id="f-tel"></div>
                <div class="form-group"><label>Cell</label><input type="text" id="f-cell"></div>
            </div>
            <div class="form-group"><label>Orari</label><table id="f-orari"></table></div>
            <div style="text-align:right; margin-top:20px;">
                <button class="btn-top" onclick="closeAddForm()" style="background:#666">Chiudi</button>
                <button class="btn-top" onclick="save()" style="background:var(--secondary)">Salva</button>
            </div>
        </div>
    </div>

    <div id="search-overlay" class="modal-overlay hidden">
        <div class="form-card">
            <h2>Ricerca Avanzata</h2>
            <input type="text" placeholder="Cerca nome..." style="width:100%; margin-bottom:10px;">
            <button class="btn-top" onclick="closeSearchPanel()">CHIUDI</button>
        </div>
    </div>

    <div id="manage-overlay" class="modal-overlay hidden">
        <div class="form-card">
            <h2>Gestione Struttura</h2>
            <p>Sezione in manutenzione...</p>
            <button class="btn-top" onclick="closeManage()">Esci</button>
        </div>
    </div>

    <div id="sidebar">
        <div style="padding:10px; background:#eee;"><b>Google</b> <button onclick="toggleGoogleSearch()">X</button></div>
        <iframe id="g-frame" src="about:blank"></iframe>
    </div>

    <script>
        const schema = {
            "AUTO": { icon: "🚗", sub: ["Carrozzeria", "Elettrauto", "Gommista", "Meccanico"] },
            "SALUTE": { icon: "🏥", sub: ["Farmacia", "Medico", "Ospedale", "Veterinario"] },
            "RISTORANTI": { icon: "🍴", sub: ["Pizzeria", "Etnico", "Trattoria"], subSub: {"Etnico": ["Cinese", "Giapponese"]} }
            // ...aggiungerai le altre qui
        };

        let contacts = JSON.parse(localStorage.getItem('app_contacts')) || [];

        function init() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('admin') !== '1') {
                document.querySelectorAll('button[onclick*="openManage"], button[onclick*="openAddForm"], button[onclick*="toggleGoogleSearch"]').forEach(b => b.style.display='none');
            }
            renderMain();
            initOrari();
        }

        function renderMain() {
            const g = document.getElementById('view-main');
            g.innerHTML = "";
            Object.keys(schema).sort().forEach(c => {
                g.innerHTML += `<div class="card-cat" onclick="openCat('${c}')"><i>${schema[c].icon}</i><b>${c}</b></div>`;
            });
        }

        function openCat(c) {
            document.getElementById('view-main').classList.add('hidden');
            document.getElementById('view-detail').classList.remove('hidden');
            document.getElementById('title-detail').innerText = c;
        }

        function goHome() {
            document.getElementById('view-main').classList.remove('hidden');
            document.getElementById('view-detail').classList.add('hidden');
        }

        function openAddForm() {
            document.getElementById('form-overlay').classList.remove('hidden');
            const s = document.getElementById('f-cat');
            s.innerHTML = '<option>Scegli...</option>';
            Object.keys(schema).sort().forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
        }

        function closeAddForm() { document.getElementById('form-overlay').classList.add('hidden'); }
        function openSearchPanel() { document.getElementById('search-overlay').classList.remove('hidden'); }
        function closeSearchPanel() { document.getElementById('search-overlay').classList.add('hidden'); }
        function openManage() { document.getElementById('manage-overlay').classList.remove('hidden'); }
        function closeManage() { document.getElementById('manage-overlay').classList.add('hidden'); }
        function toggleGoogleSearch() { 
            const s = document.getElementById('sidebar'); s.classList.toggle('open');
            if(s.classList.contains('open')) document.getElementById('g-frame').src = "https://www.google.com/search?igu=1";
        }

        function updateSub() {
            const cat = document.getElementById('f-cat').value;
            const s = document.getElementById('f-sub');
            s.innerHTML = '<option>Scegli...</option>';
            if(schema[cat]) schema[cat].sub.sort().forEach(sub => s.innerHTML += `<option value="${sub}">${sub}</option>`);
        }

        function updateSubSub() {
            const cat = document.getElementById('f-cat').value;
            const sub = document.getElementById('f-sub').value;
            const group = document.getElementById('ss-group');
            const s = document.getElementById('f-ss');
            if(schema[cat]?.subSub?.[sub]) {
                group.classList.remove('hidden');
                s.innerHTML = '<option>Scegli...</option>';
                schema[cat].subSub[sub].sort().forEach(ss => s.innerHTML += `<option value="${ss}">${ss}</option>`);
            } else { group.classList.add('hidden'); }
        }

        function initOrari() {
            const t = document.getElementById('f-orari');
            ["Lun", "Mar", "Mer", "Gio", "Ven", "Sab", "Dom"].forEach(d => {
                t.innerHTML += `<tr><td>${d}</td><td><input type="time"> - <input type="time"></td></tr>`;
            });
        }

        function save() { alert("Simulazione: Contatto salvato!"); closeAddForm(); }

        window.onload = init;
    </script>
</body>
</html>
